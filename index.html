<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad Colán</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌾 Contabilidad Colán</h1>
        <p>Control simple de Ventas, Gastos e Inventario</p>
        <p><strong>Pueblo Nuevo de Colán - Piura</strong></p>
    </header>

    <nav>
        <button onclick="showSection('inventario')">Inventario</button>
        <button onclick="showSection('ventas')">Ventas</button>
        <button onclick="showSection('gastos')">Gastos</button>
        <button onclick="showSection('reportes')">Reportes</button>
    </nav>

    <main>
        <section id="inventario" class="section">
            <h2>Inventario</h2>
            <input type="text" id="prodNombre" placeholder="Producto (ej. camote)">
            <input type="number" id="prodCantidad" placeholder="Cantidad">
            <input type="text" id="prodUnidad" placeholder="Unidad" value="kg">
            <button onclick="agregarProducto()">Agregar/Actualizar</button>
            <ul id="listaInventario"></ul>
        </section>

        <section id="ventas" class="section hidden">
            <h2>Registrar Venta</h2>
            <select id="ventaProducto"></select><br><br>
            <input type="number" id="ventaCantidad" placeholder="Cantidad vendida">
            <input type="number" id="ventaPrecio" placeholder="Precio unitario (S/)">
            <button onclick="registrarVenta()">Registrar Venta</button>
            <ul id="listaVentas"></ul>
        </section>

        <section id="gastos" class="section hidden">
    <h2>Registrar Gasto</h2>
    <input type="text" id="gastoDesc" placeholder="Descripción (ej. Fertilizantes)">
    <input type="number" id="gastoMonto" placeholder="Monto S/.">
    
    <select id="gastoCategoria">
        <option value="Agricultura">Agricultura</option>
        <option value="Pesca">Pesca</option>
        <option value="Barberia">Barbería</option>
        <option value="Ropa">Ropa</option>
        <option value="Otros">Otros</option>
    </select>
    
    <select id="gastoProducto">
        <option value="">Sin producto específico</option>
    </select>
    
    <button onclick="registrarGasto()">Registrar Gasto</button>
    <ul id="listaGastos"></ul>
</section>

        <section id="reportes" class="section hidden">
            <h2>Reportes</h2>
            <button onclick="generarReporte()">Generar Reporte Actual</button><br><br>
            <div id="reporteContenido"></div>
            <button onclick="exportarCSV()">Exportar a CSV</button>
        </section>
    </main>

    <footer>
        <p>Prototipo para tesis - Contabilidad Rural</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
